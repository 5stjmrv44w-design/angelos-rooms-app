<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angelos Rooms</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f7f8;
}

header {
  background: linear-gradient(135deg,#4f7c82,#6ea5a8);
  color: white;
  padding: 20px;
  border-radius: 0 0 20px 20px;
}

h1 {
  margin: 0;
}

.container {
  padding: 15px;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #4f7c82;
  color: white;
  margin: 5px;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 15px;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 5px;
}

.day {
  padding: 10px;
  text-align: center;
  border-radius: 8px;
}

.booked {
  background: #ffb3b3;
}
.free {
  background: #e7f7e7;
}
</style>
</head>

<body>

<header>
  <h1>Angelos Rooms</h1>
  <p>Διαχείριση δωματίων</p>
</header>

<div class="container">

<div class="card">
<h3>Προσθήκη κράτησης</h3>

<input id="room" placeholder="Δωμάτιο"><br><br>
<input id="start" type="date"><br><br>
<input id="end" type="date"><br><br>

<button onclick="addBooking()">Αποθήκευση</button>
</div>

<div class="card">
<h3>Ημερολόγιο</h3>
<div id="calendar" class="calendar"></div>
</div>

</div>

<script>

let bookings = JSON.parse(localStorage.getItem("bookings") || "[]");

function addBooking(){
  let room = document.getElementById("room").value;
  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;

  bookings.push({room,start,end});
  localStorage.setItem("bookings", JSON.stringify(bookings));
  render();
}

function render(){
  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let days = 30;

  for(let i=1;i<=days;i++){
    let div = document.createElement("div");
    div.className = "day free";

    let isBooked = bookings.some(b => true);

    if(isBooked){
      div.className = "day booked";
      div.innerText = "Κατειλημμένο";
    } else {
      div.innerText = i;
    }

    cal.appendChild(div);
  }
}

render();

</script>

</body>
</html>
